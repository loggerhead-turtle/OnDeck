{% extends "base.html" %}
{% block title %}Set Your Password{% endblock %}
{% block content %}

<div class="max-w-sm mx-auto mt-8">

  <div class="mb-6">
    <h1 class="text-2xl font-bold text-white">Set Your Password</h1>
    <p class="text-sm text-gray-400 mt-2">
      Your coach set a temporary password for you.
      Choose something you'll remember — this replaces it.
    </p>
  </div>

  <div class="bg-gray-800 rounded-xl border border-gray-700/50 p-6 shadow-xl">
    <form method="POST" action="{{ url_for('ondeck_my_profile_change_password_post') }}">
      <div class="space-y-4">

        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1.5">New Password</label>
          <input type="password" name="password"
                 required minlength="6" autofocus autocomplete="new-password"
                 class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-3 text-white text-base focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500/30 transition-colors"
                 oninput="checkMatch()">
          <p class="text-xs text-gray-600 mt-1">Minimum 6 characters.</p>
        </div>

        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1.5">Confirm Password</label>
          <input type="password" name="confirm" id="confirm-pw"
                 required autocomplete="new-password"
                 class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-3 text-white text-base focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500/30 transition-colors"
                 oninput="checkMatch()">
          <p id="match-msg" class="text-xs mt-1 hidden"></p>
        </div>

        <button type="submit" id="submit-btn"
                class="w-full py-3 rounded-lg bg-green-700 hover:bg-green-600 text-white font-bold text-sm transition-colors">
          Set Password &amp; Continue
        </button>

      </div>
    </form>
  </div>

</div>

<script>
function checkMatch() {
  const pw  = document.querySelector('[name=password]').value
  const cfm = document.getElementById('confirm-pw').value
  const msg = document.getElementById('match-msg')
  const btn = document.getElementById('submit-btn')
  if (!cfm) { msg.classList.add('hidden'); btn.disabled = false; return }
  if (pw === cfm) {
    msg.textContent = '✔ Passwords match'
    msg.className = 'text-xs mt-1 text-green-500'
    btn.disabled = false
  } else {
    msg.textContent = '✕ Passwords do not match'
    msg.className = 'text-xs mt-1 text-red-400'
    btn.disabled = true
  }
  msg.classList.remove('hidden')
}
</script>

{% endblock %}
