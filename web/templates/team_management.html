{% extends "base.html" %}
{% block title %}Manage Teams{% endblock %}
{% block content %}

<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold">Team Management</h1>
  <a href="{{ url_for('ondeck_signup_links') }}"
     class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-green-700 hover:bg-green-600 text-white text-sm font-medium transition-colors">
    Create Signup Link
  </a>
</div>

<div class="grid gap-6">
  <!-- Add team -->
  <div class="bg-gray-800 border border-gray-700/50 rounded-xl p-6">
    <h2 class="text-lg font-semibold text-white mb-4">Add New Team</h2>
    <form method="POST" action="{{ url_for('ondeck_teams_add') }}" class="flex gap-3">
      <input type="text" name="name" placeholder="Team name" required
             class="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-green-500">
      <button type="submit" class="px-4 py-2 rounded-lg bg-green-700 hover:bg-green-600 text-white text-sm font-semibold transition-colors">
        Add
      </button>
    </form>
  </div>

  <!-- Teams list -->
  <div class="bg-gray-800 border border-gray-700/50 rounded-xl p-6">
    <h2 class="text-lg font-semibold text-white mb-4">Teams</h2>
    {% if teams %}
    <div class="space-y-3">
      {% for team_id, team in teams %}
      <div class="bg-gray-900 border border-gray-700/50 rounded-lg p-4 flex items-center justify-between gap-4">
        <div class="flex-1">
          <form method="POST" action="{{ url_for('ondeck_teams_update', tid=team_id) }}" class="flex gap-2">
            <input type="text" name="name" value="{{ team['name'] }}" required
                   class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-green-500">
            <button type="submit" class="px-3 py-2 rounded-lg bg-gray-700 hover:bg-green-700 text-gray-200 hover:text-white text-sm font-medium transition-colors">
              Save
            </button>
          </form>
        </div>
        <form method="POST" action="{{ url_for('ondeck_teams_delete', tid=team_id) }}" onsubmit="return confirm('Delete this team?');">
          <button type="submit" class="px-3 py-2 rounded-lg bg-red-700 hover:bg-red-600 text-white text-sm font-medium transition-colors">
            Delete
          </button>
        </form>
      </div>
      {% endfor %}
    </div>
    {% else %}
    <p class="text-gray-400 text-sm">No teams yet. Create one above.</p>
    {% endif %}
  </div>
</div>

{% endblock %}
